<body>

  <header>
    <div class="logo">🎬 Cine Plus TV</div>
  </header>

  <!-- 🔝 ANUNCIO SUPERIOR -->
  <div class="ad-block">
    <ins class="adsbygoogle"

  <!-- 🎥 CONTENEDOR DE PELÍCULAS -->
  <div id="movies"></div>
  <div id="sentinel"></div>

  <!-- 📺 REPRODUCTOR -->
  <div id="tv">
    <div id="player"></div>
    <div class="controls">
      <button onclick="skip()">⏭ Siguiente</button>
    </div>

    <!-- 🔸 Anuncio dentro del reproductor -->
    <div class="ad-block">
      <ins class="adsbygoogle"

         data-ad-slot="7483187938"></ins>

  <!-- 🎞️ SCRIPT PRINCIPAL -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const OMDB_KEY = "d58f0933";
    const TMDB_KEY = "a75df45f5957e88b88043e6e9558b941";
    let playlist = [], page = 1, index = -1, player;

    // ✅ Video de bienvenida
    const introVideoId = "8ZcmTl_1ER8"; // <-- cambia por el ID de tu video de intro (YouTube)

    // ✅ Crear reproductor con detección de errores o videos bloqueados
    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        playerVars: { autoplay: 1, controls: 1, rel: 0, mute: 1, playsinline: 1 },
        events: {
          onReady: () => { play(introVideoId); },
          onStateChange: e => {
            if (e.data === 0) { // 0 = terminado
              if (index === -1) { index = 0; playTrailer(playlist[index]); }
              else { next(); }
            }
          },
          onError: e => { console.warn("⚠️ Video bloqueado o eliminado, saltando..."); next(); }
        }
      });
    }

    function play(id) { player.loadVideoById(id); }
    function skip() { next(); }

    // ✅ Cambiar automáticamente al siguiente trailer
    async function next() {
      index++;
      if (index >= playlist.length - 1) await load();
      playTrailer(playlist[index]);
    }

    // ✅ Cargar y reproducir trailers desde TMDB
    async function playTrailer(imdb) {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/find/${imdb}?api_key=${TMDB_KEY}&external_source=imdb_id`);
        const data = await res.json();
        if (!data.movie_results[0]) return next();

        const movieId = data.movie_results[0].id;
        const vids = await fetch(`https://api.themoviedb.org/3/movie/${movieId}/videos?api_key=${TMDB_KEY}`);
        const vd = await vids.json();

        const trailer = vd.results.find(x => x.site === "YouTube" && (x.type === "Trailer" || x.type === "Teaser"));
        if (trailer) play(trailer.key);
        else next();
      } catch (err) {
        console.error("❌ Error cargando trailer:", err);
        next();
      }
    }

    // ✅ Cargar catálogo (scroll infinito)
    async function load() {
      try {
        const res = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=movie&type=movie&page=${page}`);
        const data = await res.json();
        if (data.Response === "True") {
          data.Search.forEach(m => {
            playlist.push(m.imdbID);
            const c = document.createElement("div");
            c.className = "card";
            c.innerHTML = `<img src="${m.Poster}" alt="${m.Title}"><p>${m.Title}</p>`;
            c.onclick = () => { index = playlist.indexOf(m.imdbID); playTrailer(m.imdbID); };
            movies.appendChild(c);
          });
          page++;
        }
      } catch (e) {
        console.error("Error cargando películas:", e);
      }
    }

    // Activar scroll infinito
    new IntersectionObserver(e => e[0].isIntersecting && load()).observe(sentinel);

    // Iniciar al cargar
    window.onload = async () => {
      await load();
    };
  </script>

</body>
