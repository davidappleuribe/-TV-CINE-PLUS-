<style>
body {

#tv {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;

#player-container {

  bottom: 10%;

  display: none;
  z-index: 10000;
  width: 300px;
  max-width: 80%;

  border: none;
  color: white;
  padding: 4px 8px;
  border-radius: 5px;
  cursor: pointer;
}

.controls { margin-top: 10px; display: flex; gap: 10px; }
.controls button {
  background: #e50914; border: none; padding: 10px 20px;
  color: #fff; border-radius: 6px; font-size: 16px; cursor: pointer;
}
@media (max-width: 600px) {

  .logo { font-size: 20px; }

footer {

footer a { color: #e50914; text-decoration: none; margin: 0 8px; }

#cookie-banner {

<body>

<div style="text-align:center;margin:10px 0;">

<!-- 📽️ SCRIPT PRINCIPAL -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const OMDB_KEY = "d58f0933";
const TMDB_KEY = "a75df45f5957e88b88043e6e9558b941";
let playlist = [], page = 1, index = 0, player;

function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    playerVars: { autoplay: 1, controls: 1, rel: 0, mute: 1, playsinline: 1 },
    events: {
      onStateChange: e => { if (e.data === 0) next(); },
      onError: () => { console.warn("Video bloqueado, saltando..."); next(); }
    }
  });
}

function play(id){ player.loadVideoById(id); }
function skip(){ next(); }

async function next(){
  index++;
  if(index >= playlist.length - 1) await load();
  playTrailer(playlist[index]);
}

async function playTrailer(imdb){
  try{
    const f = await fetch(`https://api.themoviedb.org/3/find/${imdb}?api_key=${TMDB_KEY}&external_source=imdb_id`);
    const d = await f.json();
    if(!d.movie_results[0]) return next();

    const v = await fetch(`https://api.themoviedb.org/3/movie/${d.movie_results[0].id}/videos?api_key=${TMDB_KEY}`);
    const vd = await v.json();
    const t = vd.results.find(x => x.site==="YouTube" && x.type==="Trailer");
    if(t) play(t.key);
    else next();
  }catch(e){ console.error(e); next(); }
}

async function load(){
  const r = await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=movie&type=movie&page=${page}`);
  const d = await r.json();
  if(d.Response==="True"){
    d.Search.forEach(m=>{
      playlist.push(m.imdbID);
      const c=document.createElement("div");
      c.className="card";
      c.innerHTML=`<img src="${m.Poster}" alt="${m.Title}"><p>${m.Title}</p>`;
      c.onclick=()=>{index=playlist.indexOf(m.imdbID); playTrailer(m.imdbID);};
      movies.appendChild(c);
    });
    page++;
  }
}
new IntersectionObserver(e=>e[0].isIntersecting&&load()).observe(sentinel);

window.onload=async()=>{ await load(); setTimeout(()=>playTrailer(playlist[0]),3000); };

// 🍪 Cookies
function acceptCookies(){document.getElementById('cookie-banner').style.display='none';localStorage.setItem('cookiesAccepted','yes');}
if(localStorage.getItem('cookiesAccepted'))document.getElementById('cookie-banner').style.display='none';

// 💬 Popup
function showPopup(){document.getElementById('ad-popup').style.display='block';}
function closePopup(){document.getElementById('ad-popup').style.display='none';}
setInterval(showPopup,120000);

// 🎥 Anuncio dentro del video
function showVideoAd(){
  document.getElementById('video-ad').style.display='block';
  (adsbygoogle=window.adsbygoogle||[]).push({});
  setTimeout(closeVideoAd,15000);
}
function closeVideoAd(){document.getElementById('video-ad').style.display='none';}

// Mostrar anuncio en video cada 60 segundos
setInterval(showVideoAd,60000);
</script>
