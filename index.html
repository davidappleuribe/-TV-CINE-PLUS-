<!-- 🎥 SCRIPT DE VIDEOS -->
<script src="https://www.youtube.com/iframe_api"></script>
<script>
const OMDB_KEY="d58f0933";
const TMDB_KEY="a75df45f5957e88b88043e6e9558b941";
let playlist=[],page=1,index=0,player;

     
// ✅ Crear reproductor con detección de errores
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    playerVars: { autoplay: 1, controls: 1, rel: 0, mute: 1, playsinline: 1 },
    events: { 
      onStateChange: e => { if (e.data === 0) next(); },
      onError: () => { console.warn("🎬 Video bloqueado, saltando..."); next(); }
    }
  });
}
// ✅ Crea el reproductor
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    playerVars: { autoplay: 1, controls: 1, rel: 0, mute: 1, playsinline: 1 },
    events: { 
      onStateChange: e => { if (e.data === 0) next(); },
      onError: () => { console.warn("🎬 Video bloqueado. Saltando..."); next(); }
    }
  });
}

function onYouTubeIframeAPIReady(){
player=new YT.Player("player",{
playerVars:{autoplay:1,controls:1,rel:0,mute:1},
events:{onStateChange:e=>{if(e.data===0)next();}}
});
}

function play(id){player.loadVideoById(id);}
function skip(){next();}

async function next(){
index++;
if(index>=playlist.length-1) await load();
playTrailer(playlist[index]);
}

async function playTrailer(imdb){
const f=await fetch(`https://api.themoviedb.org/3/find/${imdb}?api_key=${TMDB_KEY}&external_source=imdb_id`);
const d=await f.json();
if(!d.movie_results[0]) return next();
const v=await fetch(`https://api.themoviedb.org/3/movie/${d.movie_results[0].id}/videos?api_key=${TMDB_KEY}`);
const vd=await v.json();
const t=vd.results.find(x=>x.site==="YouTube");
if(t) play(t.key); else next();
}

async function load(){
const r=await fetch(`https://www.omdbapi.com/?apikey=${OMDB_KEY}&s=movie&page=${page}`);
const d=await r.json();
if(d.Response==="True"){
d.Search.forEach(m=>{
playlist.push(m.imdbID);
const c=document.createElement("div");
c.className="card";
c.innerHTML=`<img src="${m.Poster}"><p>${m.Title}</p>`;
c.onclick=()=>{index=playlist.indexOf(m.imdbID);playTrailer(m.imdbID);};
movies.appendChild(c);
});
page++;

// anuncio cada bloque de carga
const ad=document.createElement("div");
ad.className="ad-block";
ad.innerHTML=`<ins class="adsbygoogle" style="display:block" data-ad-format="in-article" data-ad-layout-key="-fb+5w+4e-db+86" data-ad-client="ca-pub-3623005145407316" data-ad-slot="4103131320"></ins>`;
movies.appendChild(ad);
(adsbygoogle=window.adsbygoogle||[]).push({});
}
}

window.onload=async()=>{
await load();
setTimeout(()=>playTrailer(playlist[0]),3000);
};
</script>
